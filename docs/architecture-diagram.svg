<svg viewBox="0 0 1200 1900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="55%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#A78BFA"/>
    </marker>
  </defs>

  <rect width="1200" height="1900" fill="#0A0E1A"/>
  <rect width="1200" height="1900" fill="url(#edgeGrad)" opacity="0.02"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-size="36" font-weight="700" fill="url(#titleGrad)">Vehicle Complaint Intelligence</text>
  <text x="600" y="82" text-anchor="middle" font-size="16" fill="#94A3B8">System architecture — raw NHTSA complaints to a served, explainable prediction</text>

  <!-- SECTION: DATA SOURCE -->
  <text x="600" y="122" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">DATA SOURCE</text>
  <rect x="300" y="136" width="600" height="64" rx="12" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="163" text-anchor="middle" font-size="16" font-weight="600" fill="#E7ECF3">data/raw/complaints.csv</text>
  <text x="600" y="184" text-anchor="middle" font-size="13" fill="#94A3B8">271,517 real NHTSA safety complaints (2016–2026 model years)</text>

  <line x1="600" y1="200" x2="600" y2="232" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SECTION: PIPELINE -->
  <text x="600" y="252" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">DATA PIPELINE — src/data/pipeline.py</text>

  <!-- 5 pipeline boxes -->
  <g font-size="14">
    <rect x="40" y="266" width="208" height="104" rx="10" fill="#131722" stroke="#2A3145"/>
    <text x="144" y="292" text-anchor="middle" font-weight="600" fill="#E7ECF3">loader.py</text>
    <text x="144" y="312" text-anchor="middle" font-size="12" fill="#94A3B8">Validate schema,</text>
    <text x="144" y="328" text-anchor="middle" font-size="12" fill="#94A3B8">parse dtypes</text>

    <rect x="268" y="266" width="208" height="104" rx="10" fill="#131722" stroke="#2A3145"/>
    <text x="372" y="292" text-anchor="middle" font-weight="600" fill="#E7ECF3">cleaning.py</text>
    <text x="372" y="312" text-anchor="middle" font-size="12" fill="#94A3B8">Drop null rows,</text>
    <text x="372" y="328" text-anchor="middle" font-size="12" fill="#94A3B8">dedupe on text only</text>

    <rect x="496" y="266" width="208" height="104" rx="10" fill="#131722" stroke="#2A3145"/>
    <text x="600" y="292" text-anchor="middle" font-weight="600" fill="#E7ECF3">labels.py</text>
    <text x="600" y="312" text-anchor="middle" font-size="12" fill="#94A3B8">Primary component,</text>
    <text x="600" y="328" text-anchor="middle" font-size="12" fill="#94A3B8">collapse rare → OTHER</text>

    <rect x="724" y="266" width="208" height="104" rx="10" fill="#131722" stroke="#2A3145"/>
    <text x="828" y="292" text-anchor="middle" font-weight="600" fill="#E7ECF3">preprocessing/</text>
    <text x="828" y="312" text-anchor="middle" font-size="12" fill="#94A3B8">Contractions, casing,</text>
    <text x="828" y="328" text-anchor="middle" font-size="12" fill="#94A3B8">stopwords + lemmatize</text>

    <rect x="952" y="266" width="208" height="104" rx="10" fill="#131722" stroke="#2A3145"/>
    <text x="1056" y="292" text-anchor="middle" font-weight="600" fill="#E7ECF3">splits.py</text>
    <text x="1056" y="312" text-anchor="middle" font-size="12" fill="#94A3B8">Stratified 70/15/15 +</text>
    <text x="1056" y="328" text-anchor="middle" font-size="12" fill="#94A3B8">time-based holdout</text>
  </g>

  <!-- chevrons between pipeline boxes -->
  <g fill="none" stroke="#5B6577" stroke-width="2">
    <path d="M256,313 l14,5 l-14,5"/>
    <path d="M484,313 l14,5 l-14,5"/>
    <path d="M712,313 l14,5 l-14,5"/>
    <path d="M940,313 l14,5 l-14,5"/>
  </g>

  <!-- leakage guard callout -->
  <rect x="40" y="386" width="1120" height="52" rx="10" fill="#131722" stroke="#34D399" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="60" y="408" font-size="12" fill="#34D399" font-weight="600">LEAKAGE GUARDS</text>
  <text x="60" y="426" font-size="12" fill="#94A3B8">dedupe keyed on complaint text alone · no upsampling before split · assert_no_text_leakage() enforced · separate time-based holdout for real drift</text>

  <line x1="600" y1="438" x2="600" y2="470" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="350" y="475" width="500" height="58" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="500" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">data/processed/{train,val,test}.parquet</text>
  <text x="600" y="518" text-anchor="middle" font-size="12" fill="#94A3B8">leakage-checked, stratified splits</text>

  <line x1="600" y1="533" x2="600" y2="565" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SECTION: TRAINING -->
  <text x="600" y="585" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">MODEL TRAINING — src/training/</text>

  <!-- baseline branch: 3 stacked boxes -->
  <rect x="40" y="600" width="560" height="60" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="320" y="626" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">TF-IDF featurizer</text>
  <text x="320" y="644" text-anchor="middle" font-size="12" fill="#94A3B8">fit on train split only</text>

  <rect x="40" y="668" width="560" height="60" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="320" y="694" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Bake-off: LogReg · LinearSVC · XGBoost</text>
  <text x="320" y="712" text-anchor="middle" font-size="12" fill="#94A3B8">class_weight="balanced" (no upsampling)</text>

  <rect x="40" y="736" width="560" height="60" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="320" y="762" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Winner selected by validation macro-F1</text>
  <text x="320" y="780" text-anchor="middle" font-size="12" fill="#94A3B8">Linear SVC + TF-IDF wins</text>

  <!-- transformer branch: single tall box -->
  <rect x="620" y="600" width="540" height="196" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="890" y="628" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Transformer fine-tune</text>
  <text x="890" y="652" text-anchor="middle" font-size="12" fill="#94A3B8">DistilBERT / DeBERTa-v3-base</text>
  <text x="890" y="674" text-anchor="middle" font-size="12" fill="#94A3B8">LR warmup + stable class-weighted loss</text>
  <text x="890" y="696" text-anchor="middle" font-size="12" fill="#94A3B8">(two real training-instability bugs found</text>
  <text x="890" y="716" text-anchor="middle" font-size="12" fill="#94A3B8">and fixed — see docs/model_benchmark.md)</text>

  <line x1="320" y1="796" x2="320" y2="810" stroke="#A78BFA" stroke-width="2"/>
  <line x1="890" y1="796" x2="890" y2="810" stroke="#A78BFA" stroke-width="2"/>
  <line x1="320" y1="810" x2="890" y2="810" stroke="#A78BFA" stroke-width="2"/>
  <line x1="600" y1="810" x2="600" y2="828" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="40" y="833" width="1120" height="58" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="858" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Evaluated once on the held-out test set</text>
  <text x="600" y="876" text-anchor="middle" font-size="12" fill="#94A3B8">all runs logged to MLflow — experiments/mlruns.db</text>

  <line x1="600" y1="891" x2="600" y2="923" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SECTION: PROMOTION -->
  <text x="600" y="943" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">MODEL PROMOTION</text>

  <rect x="40" y="958" width="560" height="78" rx="10" fill="#131722" stroke="#34D399" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="320" y="984" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">models/production/</text>
  <text x="320" y="1003" text-anchor="middle" font-size="12" fill="#94A3B8">model.joblib + vectorizer.joblib + metadata.json</text>
  <text x="320" y="1020" text-anchor="middle" font-size="12" fill="#34D399">servable default (baseline)</text>

  <rect x="620" y="958" width="540" height="78" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="890" y="984" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">models/transformer/</text>
  <text x="890" y="1003" text-anchor="middle" font-size="12" fill="#94A3B8">available via SERVING_MODEL_BACKEND=transformer</text>
  <text x="890" y="1020" text-anchor="middle" font-size="12" fill="#94A3B8">swappable, not the default</text>

  <line x1="600" y1="1036" x2="600" y2="1068" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SECTION: SERVING -->
  <text x="600" y="1088" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">SERVING LAYER</text>

  <rect x="40" y="1103" width="560" height="66" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="320" y="1130" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">FastAPI — app/main.py</text>
  <text x="320" y="1148" text-anchor="middle" font-size="12" fill="#94A3B8">/predict · /batch-predict · /metrics · /retrain</text>

  <rect x="620" y="1103" width="540" height="66" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="890" y="1130" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Streamlit — app/streamlit_app/</text>
  <text x="890" y="1148" text-anchor="middle" font-size="12" fill="#94A3B8">interactive demo UI</text>

  <line x1="320" y1="1169" x2="320" y2="1183" stroke="#A78BFA" stroke-width="2"/>
  <line x1="890" y1="1169" x2="890" y2="1183" stroke="#A78BFA" stroke-width="2"/>
  <line x1="320" y1="1183" x2="890" y2="1183" stroke="#A78BFA" stroke-width="2"/>
  <line x1="600" y1="1183" x2="600" y2="1201" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="1206" width="600" height="58" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="1230" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">src/services/classification_service.py</text>
  <text x="600" y="1248" text-anchor="middle" font-size="12" fill="#94A3B8">shared predict + log logic — one code path, two front doors</text>

  <line x1="600" y1="1264" x2="600" y2="1296" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="300" y="1301" width="600" height="58" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="1325" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">src/inference/predictor.py — PredictorService</text>
  <text x="600" y="1343" text-anchor="middle" font-size="12" fill="#94A3B8">hides baseline-vs-transformer backend differences</text>

  <line x1="600" y1="1359" x2="600" y2="1377" stroke="#A78BFA" stroke-width="2"/>
  <line x1="375" y1="1377" x2="825" y2="1377" stroke="#A78BFA" stroke-width="2"/>
  <line x1="375" y1="1377" x2="375" y2="1391" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="825" y1="1377" x2="825" y2="1391" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="160" y="1396" width="430" height="80" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="375" y="1424" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">src/explainability/</text>
  <text x="375" y="1443" text-anchor="middle" font-size="12" fill="#94A3B8">SHAP LinearExplainer, confidence,</text>
  <text x="375" y="1460" text-anchor="middle" font-size="12" fill="#94A3B8">top-3 (baseline backend only)</text>

  <rect x="610" y="1396" width="430" height="80" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="825" y="1424" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">src/monitoring/prediction_log.py</text>
  <text x="825" y="1443" text-anchor="middle" font-size="12" fill="#94A3B8">latency, counts,</text>
  <text x="825" y="1460" text-anchor="middle" font-size="12" fill="#94A3B8">class distribution</text>

  <line x1="375" y1="1476" x2="375" y2="1490" stroke="#A78BFA" stroke-width="2"/>
  <line x1="825" y1="1476" x2="825" y2="1490" stroke="#A78BFA" stroke-width="2"/>
  <line x1="375" y1="1490" x2="825" y2="1490" stroke="#A78BFA" stroke-width="2"/>
  <line x1="600" y1="1490" x2="600" y2="1508" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="350" y="1513" width="500" height="58" rx="10" fill="#131722" stroke="#F472B6" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="600" y="1538" text-anchor="middle" font-size="14" font-weight="600" fill="#E7ECF3">Response</text>
  <text x="600" y="1557" text-anchor="middle" font-size="12" fill="#94A3B8">predicted label + confidence + top-3 + explanation</text>

  <line x1="600" y1="1571" x2="600" y2="1603" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- SECTION: DEPLOYMENT -->
  <text x="600" y="1623" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">DEPLOYMENT</text>

  <rect x="140" y="1638" width="920" height="72" rx="10" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="1667" text-anchor="middle" font-size="15" font-weight="600" fill="#E7ECF3">Docker / docker-compose</text>
  <text x="600" y="1688" text-anchor="middle" font-size="12" fill="#94A3B8">API on :8000 (FastAPI docs)  +  Streamlit UI on :8501</text>

  <!-- RESULTS FOOTER -->
  <text x="600" y="1745" text-anchor="middle" font-size="13" letter-spacing="2" fill="#22D3EE" font-weight="600">RESULTS — 188,056-row train set · 40,298-row held-out test</text>

  <rect x="40" y="1760" width="360" height="110" rx="12" fill="#131722" stroke="#2A3145"/>
  <text x="220" y="1786" text-anchor="middle" font-size="14" font-weight="700" fill="#E7ECF3">TF-IDF + Linear SVC</text>
  <text x="220" y="1804" text-anchor="middle" font-size="12" fill="#94A3B8">production default</text>
  <text x="220" y="1826" text-anchor="middle" font-size="13" fill="#22D3EE">Macro-F1 0.625 · Acc 64.1%</text>
  <text x="220" y="1846" text-anchor="middle" font-size="13" fill="#34D399">Latency 0.022 ms</text>
  <text x="220" y="1864" text-anchor="middle" font-size="12" fill="#94A3B8">full SHAP explainability</text>

  <rect x="420" y="1760" width="360" height="110" rx="12" fill="#131722" stroke="#2A3145"/>
  <text x="600" y="1786" text-anchor="middle" font-size="14" font-weight="700" fill="#E7ECF3">DistilBERT (fine-tuned)</text>
  <text x="600" y="1804" text-anchor="middle" font-size="12" fill="#94A3B8">swappable backend</text>
  <text x="600" y="1826" text-anchor="middle" font-size="13" fill="#22D3EE">Macro-F1 0.667 · Acc 67.4%</text>
  <text x="600" y="1846" text-anchor="middle" font-size="13" fill="#A78BFA">Latency 18.7 ms</text>
  <text x="600" y="1864" text-anchor="middle" font-size="12" fill="#94A3B8">no explainability yet</text>

  <rect x="800" y="1760" width="360" height="110" rx="12" fill="#131722" stroke="#2A3145"/>
  <text x="980" y="1786" text-anchor="middle" font-size="14" font-weight="700" fill="#E7ECF3">DeBERTa-v3-base (fine-tuned)</text>
  <text x="980" y="1804" text-anchor="middle" font-size="12" fill="#94A3B8">best raw accuracy</text>
  <text x="980" y="1826" text-anchor="middle" font-size="13" fill="#22D3EE">Macro-F1 0.678 · Acc 67.9%</text>
  <text x="980" y="1846" text-anchor="middle" font-size="13" fill="#A78BFA">Latency 23.6 ms</text>
  <text x="980" y="1864" text-anchor="middle" font-size="12" fill="#94A3B8">no explainability yet</text>
</svg>
